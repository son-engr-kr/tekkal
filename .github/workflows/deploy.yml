name: Deploy to GitHub Pages

on:
  push:
    branches: [main, ie5374-final-project]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build main branch
        uses: actions/checkout@v4
        with:
          ref: main

      - run: npm ci

      - name: Build main
        env:
          # Custom domain (tekkal.dev) serves from root. Override VITE_BASE_PATH
          # to "/tekkal/" when deploying without the custom domain.
          VITE_BASE_PATH: /
        run: npm run build

      - run: mkdir -p _site && cp -r dist/* _site/

      - name: Build class branch
        uses: actions/checkout@v4
        with:
          ref: ie5374-final-project
          clean: false

      - run: npm ci

      - name: Build class
        env:
          VITE_BASE_PATH: /ie5374/
        run: npm run build

      - run: mkdir -p _site/ie5374 && cp -r dist/* _site/ie5374/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
