name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Typecheck + Build + Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (includes tsc -b typecheck)
        run: npm run build

      - name: Test with coverage
        run: npx vitest run --coverage

      - name: Validate bundled demo decks
        run: |
          fail=0
          for deck in templates/demos/*/deck.json; do
            echo "::group::$deck"
            if ! node scripts/tekkal-validate.mjs "$deck"; then
              fail=1
            fi
            echo "::endgroup::"
          done
          exit $fail

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14
